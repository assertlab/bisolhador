name: 🪞 Espelhamento para Codeberg

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 Sincronizando com o Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_USER: "vinicius3w"
          CODEBERG_ORG: "ASSERT_Lab"
          REPO_NAME: "bisolhador"
        run: |
          git config --global user.name "GitHub Action Mirror"
          git config --global user.email "action@github.com"
          
          git remote add codeberg https://$CODEBERG_USER:$CODEBERG_TOKEN@codeberg.org/$CODEBERG_ORG/$REPO_NAME.git
          
          git push codeberg --all --force
          git push codeberg --tags --force
